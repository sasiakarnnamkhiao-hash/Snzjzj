<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Eoy Shop - Ultra Tight Flex v6</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --miku: #39C5BB; }
        body { background: #121212; color: white; font-family: 'Tahoma', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        
        .toolbar {
            background: rgba(255,255,255,0.05); backdrop-filter: blur(15px);
            border: 1px solid var(--miku); padding: 15px; border-radius: 20px;
            display: flex; gap: 15px; flex-wrap: wrap; justify-content: center;
            position: sticky; top: 10px; z-index: 1000; margin-bottom: 20px;
        }

        .input-group { display: flex; align-items: center; gap: 8px; }
        input[type="number"] { width: 60px; background: #000; border: 1px solid var(--miku); color: #fff; padding: 5px; border-radius: 5px; }
        
        button { padding: 10px 20px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-save { background: var(--miku); color: #000; }
        .btn-clear { background: #ff4d4d; color: white; }

        /* พื้นที่แสดงผล - เปลี่ยนเป็น Flex เพื่อให้ชิดกัน */
        #capture-area {
            background: #000;
            display: flex;
            flex-wrap: wrap; /* ให้ขึ้นบรรทัดใหม่ */
            padding: 0;
            margin: 0;
            width: fit-content;
            max-width: 100%; /* คุมไม่ให้เกินจอ */
            line-height: 0; /* กำจัดช่องว่างบรรทัด */
        }

        .skin-item {
            position: relative;
            display: inline-block;
            margin: 0;
            padding: 0;
            cursor: grab;
            line-height: 0;
        }

        /* รูปสกิน - บังคับความสูง ความกว้างตามรูปจริง */
        .skin-item img {
            height: var(--img-h, 130px);
            width: auto;
            display: block;
            margin: 0;
            padding: 0;
        }

        .remove-btn {
            position: absolute; top: 2px; right: 2px;
            background: rgba(255,0,0,0.8); color: white; border: none;
            width: 20px; height: 20px; border-radius: 50%; cursor: pointer;
            display: none; z-index: 10; line-height: 1;
        }
        .skin-item:hover .remove-btn { display: block; }
        .exporting .remove-btn { display: none !important; }
    </style>
</head>
<body>

    <div class="toolbar">
        <div class="input-group">
            <label>ความกว้างป้ายรวม (px):</label>
            <input type="number" id="maxWidth" value="1000" onchange="updateLayout()">
        </div>
        <div class="input-group">
            <label>ความสูงรูป (px):</label>
            <input type="number" id="imgHeight" value="130" onchange="updateLayout()">
        </div>
        <input type="file" id="upload" multiple accept="image/*">
        <button class="btn-save" onclick="saveImage()">✨ เซฟป้ายขายรหัส</button>
        <button class="btn-clear" onclick="clearAll()">ล้างทั้งหมด</button>
    </div>

    <div id="capture-area"></div>

    <script>
        const area = document.getElementById('capture-area');
        const upload = document.getElementById('upload');
        const heightInput = document.getElementById('imgHeight');
        const widthInput = document.getElementById('maxWidth');

        new Sortable(area, { animation: 150 });

        function trimImage(img) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);
            const pixels = ctx.getImageData(0, 0, canvas.width, canvas.height);
            let bound = { top: null, left: null, right: null, bottom: null };
            for (let i = 0; i < pixels.data.length; i += 4) {
                if (pixels.data[i + 3] !== 0) {
                    let x = (i / 4) % canvas.width;
                    let y = Math.floor((i / 4) / canvas.width);
                    if (bound.top === null || y < bound.top) bound.top = y;
                    if (bound.left === null || x < bound.left) bound.left = x;
                    if (bound.right === null || x > bound.right) bound.right = x;
                    if (bound.bottom === null || y > bound.bottom) bound.bottom = y;
                }
            }
            if (bound.top === null) return img.src;
            const copy = document.createElement('canvas');
            const copyCtx = copy.getContext('2d');
            copy.width = bound.right - bound.left;
            copy.height = bound.bottom - bound.bottom === 0 ? 1 : bound.bottom - bound.top;
            copyCtx.drawImage(img, bound.left, bound.top, copy.width, copy.height, 0, 0, copy.width, copy.height);
            return copy.toDataURL();
        }

        upload.onchange = (e) => {
            const files = Array.from(e.target.files);
            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const tempImg = new Image();
                    tempImg.src = event.target.result;
                    tempImg.onload = () => {
                        const croppedSrc = trimImage(tempImg);
                        const div = document.createElement('div');
                        div.className = 'skin-item';
                        div.innerHTML = `<img src="${croppedSrc}"><button class="remove-btn" onclick="this.parentElement.remove()">×</button>`;
                        area.appendChild(div);
                        updateLayout();
                    };
                };
                reader.readAsDataURL(file);
            });
        };

        function updateLayout() {
            area.style.maxWidth = widthInput.value + 'px';
            document.documentElement.style.setProperty('--img-h', heightInput.value + 'px');
        }

        async function saveImage() {
            if(area.children.length === 0) return;
            area.classList.add('exporting');
            const canvas = await html2canvas(area, { backgroundColor: "#000", scale: 2 });
            const link = document.createElement('a');
            link.download = `EoyShop-Ready.png`;
            link.href = canvas.toDataURL();
            link.click();
            area.classList.remove('exporting');
        }

        function clearAll() { if(confirm("ลบหมดเลยนะเอย?")) area.innerHTML = ''; }
        updateLayout();
    </script>
</body>
</html>
